<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            flex: 1;
            padding: 20px;
            background: #222;
            border-radius: 10px;
            text-align: center;
        }

        .chart-box {
            background: #222;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #444;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📊 Analytics Dashboard</h1>

    <!-- SUMMARY -->
    <div class="cards">
        <div class="card">Income: ₹{{ income }}</div>
        <div class="card">Expense: ₹{{ expense }}</div>
        <div class="card">Balance: ₹{{ balance }}</div>
    </div>

    <!-- LINE CHART -->
    <div class="chart-box">
        <h3>📈 Monthly Growth</h3>
        <canvas id="lineChart" height="100"></canvas>
    </div>

    <!-- BAR CHART -->
    <div class="chart-box">
        <h3>📊 Category Expenses</h3>
        <canvas id="barChart" height="100"></canvas>
    </div>

    <!-- PIE CHART -->
    <div class="chart-box">
        <h3>🥧 Expense Distribution</h3>
        <canvas id="pieChart" height="100"></canvas>
    </div>

    <!-- TABLE -->
    <h3>📋 Transactions</h3>

    <table>
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
        </tr>

        {% for t in transactions %}
        <tr>
            <td>{{ t[0] }}</td>
            <td>{{ t[1] }}</td>
            <td>{{ t[2] }}</td>
            <td>{{ t[3] }}</td>
            <td>{{ t[4] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

<!-- JS -->


</body>
</html>
